version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: nutritracker-postgres
    environment:
      POSTGRES_DB: nutritracker_db
      POSTGRES_USER: nutritracker
      POSTGRES_PASSWORD: dev123456
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations.sql:/docker-entrypoint-initdb.d/01-migrations.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutritracker"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nutritracker-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: nutritracker-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nutritracker-network

  # NestJS Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nutritracker-backend
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: nutritracker
      DB_PASSWORD: dev123456
      DB_NAME: nutritracker_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev-secret-key-change-in-production
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    command: npm run dev
    networks:
      - nutritracker-network

volumes:
  postgres_data:
  redis_data:

networks:
  nutritracker-network:
    driver: bridge
